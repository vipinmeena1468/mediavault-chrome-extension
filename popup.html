<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediaVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a9e;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --green: #4ade80;
      --yellow: #fbbf24;
      --blue: #38bdf8;
      --orange: #fb923c;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 520px;
      min-height: 480px;
      max-height: 680px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 16px 20px 12px;
      background: linear-gradient(135deg, #0f0f1a 0%, #13131f 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(124,106,255,0.4);
    }

    h1 {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .scan-btn {
      margin-left: auto;
      background: linear-gradient(135deg, var(--accent), #5b4fcf);
      border: none;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(124,106,255,0.3);
    }
    .scan-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(124,106,255,0.45); }
    .scan-btn:active { transform: translateY(0); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .stat-chip {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 4px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.2px;
      position: relative;
    }
    .stat-chip:hover { color: var(--text); background: var(--surface2); }
    .stat-chip.active { color: var(--text); }
    .stat-chip.active[data-tab="images"] { border-color: var(--green); color: var(--green); }
    .stat-chip.active[data-tab="videos"] { border-color: var(--blue); color: var(--blue); }
    .stat-chip.active[data-tab="audio"] { border-color: var(--yellow); color: var(--yellow); }
    .stat-chip.active[data-tab="backgroundImages"] { border-color: var(--orange); color: var(--orange); }

    .count-badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 22px;
      text-align: center;
    }
    .stat-chip.active[data-tab="images"] .count-badge { background: rgba(74,222,128,0.15); }
    .stat-chip.active[data-tab="videos"] .count-badge { background: rgba(56,189,248,0.15); }
    .stat-chip.active[data-tab="audio"] .count-badge { background: rgba(251,191,36,0.15); }
    .stat-chip.active[data-tab="backgroundImages"] .count-badge { background: rgba(251,146,60,0.15); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 7px 12px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .action-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .action-btn:hover { background: var(--border); border-color: var(--accent); color: var(--accent); }
    .action-btn.zip { border-color: var(--accent); color: var(--accent); }
    .action-btn.zip:hover { background: rgba(124,106,255,0.12); }

    /* ── Grid ── */
    .grid-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .grid.list-mode {
      grid-template-columns: 1fr;
    }

    .media-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .media-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
    .media-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,106,255,0.3); }

    .card-thumb {
      width: 100%;
      height: 90px;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }
    .card-thumb.placeholder {
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      height: 90px;
    }

    .card-info {
      padding: 7px 8px;
    }
    .card-url {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .card-actions {
      display: flex; gap: 4px; margin-top: 5px;
    }
    .card-btn {
      flex: 1;
      font-family: 'Syne', sans-serif;
      font-size: 9px;
      font-weight: 700;
      padding: 4px 0;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .card-btn:hover { color: var(--text); border-color: var(--accent); }
    .card-btn.copied { color: var(--green); border-color: var(--green); }

    .select-check {
      position: absolute;
      top: 6px; left: 6px;
      width: 18px; height: 18px;
      border-radius: 5px;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      transition: all 0.15s;
    }
    .media-card.selected .select-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* List mode card */
    .grid.list-mode .media-card {
      display: flex; align-items: center; gap: 10px;
    }
    .grid.list-mode .card-thumb {
      width: 56px; height: 42px; flex-shrink: 0; border-radius: 0;
    }
    .grid.list-mode .card-thumb.placeholder { height: 42px; width: 56px; font-size: 18px; }
    .grid.list-mode .card-info { flex: 1; padding: 8px 8px 8px 0; }
    .grid.list-mode .card-actions { margin-top: 4px; }
    .grid.list-mode .select-check { top: 50%; transform: translateY(-50%); left: 8px; }

    /* ── Empty / Loading states ── */
    .state-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 220px; gap: 12px; color: var(--muted);
    }
    .state-empty .icon { font-size: 40px; opacity: 0.4; }
    .state-empty p { font-size: 13px; font-weight: 600; }
    .state-empty small { font-family: 'DM Mono', monospace; font-size: 10px; text-align: center; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      bottom: 50px; left: 50%; transform: translateX(-50%);
      background: var(--accent);
      color: white;
      font-weight: 700;
      font-size: 12px;
      padding: 8px 20px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(124,106,255,0.4);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <div class="logo">⚡</div>
    <div>
      <h1>MediaVault</h1>
      <div class="subtitle">MEDIA EXTRACTOR</div>
    </div>
    <button class="scan-btn" id="scanBtn">Scan Page</button>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat-chip active" data-tab="images">
      <span>🖼</span> Images <span class="count-badge" id="imgCount">0</span>
    </div>
    <div class="stat-chip" data-tab="videos">
      <span>🎬</span> Videos <span class="count-badge" id="vidCount">0</span>
    </div>
    <div class="stat-chip" data-tab="audio">
      <span>🎵</span> Audio <span class="count-badge" id="audCount">0</span>
    </div>
    <div class="stat-chip" data-tab="backgroundImages">
      <span>🎨</span> BG <span class="count-badge" id="bgCount">0</span>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="Filter by URL…" />
    <button class="action-btn" id="selectAllBtn">☑ All</button>
    <button class="action-btn zip" id="zipBtn">⬇ ZIP</button>
    <button class="action-btn" id="viewToggleBtn">☰</button>
  </div>

  <div class="grid-container" id="gridContainer">
    <div class="state-empty" id="emptyState">
      <div class="icon">⚡</div>
      <p>Click "Scan Page" to extract media</p>
      <small>Images · Videos · Audio · Background Images</small>
    </div>
    <div class="grid" id="mediaGrid" style="display:none;"></div>
  </div>

  <div class="footer">
    <span id="selectionInfo">0 selected</span>
    <span id="pageInfo">Ready</span>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
